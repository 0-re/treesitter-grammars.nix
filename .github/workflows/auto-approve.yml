name: Auto-approve automated PRs

# Two GitHub Apps are used in this repo because GitHub forbids self-approval:
# the App that opens a PR cannot also approve it.
#
#   - A4PR (Auto-Approve Authentic Automated PR): approver, used HERE.
#       Secrets: AUTO_APPROVE_APP_ID, AUTO_APPROVE_APP_PRIVATE_KEY
#       Permissions: Pull requests: read & write
#
#   - 0.re Concierge: generic automation bot, opens PRs, used in
#     update-grammars.yml. Installed/secrets are at the org level.
#       Secrets: CONCIERGE_APP_ID, CONCIERGE_APP_PRIVATE_KEY
#       Permissions: Contents: read & write, Pull requests: read & write,
#                    Workflows: read & write
#
# Both apps must be installed on this repository.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  approve:
    runs-on: ubuntu-latest
    # Approve PRs opened by any bot account on the update/grammars-* branches.
    # This matches the App's bot user without hardcoding its slug.
    if: >-
      github.event.pull_request.user.type == 'Bot'
      && startsWith(github.event.pull_request.head.ref, 'update/grammars-')
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AUTO_APPROVE_APP_ID }}
          private-key: ${{ secrets.AUTO_APPROVE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Approve PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr review "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --approve
