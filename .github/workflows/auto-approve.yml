name: Auto-approve automated PRs

# This workflow uses a dedicated GitHub App for approval.
# Setup:
#   1. Create a GitHub App (https://github.com/settings/apps/new)
#      - Name: e.g. "treesitter-grammars-bot"
#      - Permissions: Pull Requests (read & write)
#      - Uncheck "Webhook active" (not needed)
#   2. Install the app on this repository
#   3. Add repo secrets:
#      - AUTO_APPROVE_APP_ID: the App ID
#      - AUTO_APPROVE_APP_PRIVATE_KEY: the App's private key (.pem)

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  approve:
    runs-on: ubuntu-latest
    # Approve PRs opened by any bot account on the update/grammars-* branches.
    # This matches the App's bot user without hardcoding its slug.
    if: >-
      github.event.pull_request.user.type == 'Bot'
      && startsWith(github.event.pull_request.head.ref, 'update/grammars-')
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AUTO_APPROVE_APP_ID }}
          private-key: ${{ secrets.AUTO_APPROVE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Approve PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh pr review "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --approve
