name: Update Tree-sitter Grammars

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      grammars:
        description: 'Specific grammars to update (space-separated, empty for all)'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Nix
        uses: cachix/install-nix-action@v31

      - name: Set up git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update grammars
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GRAMMARS="${{ github.event.inputs.grammars }}"
          if [ -n "$GRAMMARS" ]; then
            nix develop --command nu scripts/update-grammars.nu --grammars "$GRAMMARS"
          else
            nix develop --command nu scripts/update-grammars.nu
          fi

      - name: Create pull request
        if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="update/grammars-$(date +%Y%m%d)"
          
          # Check if branch exists remotely and delete it
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git push origin --delete "$branch" || true
          fi
          
          git checkout -b "$branch"
          git add grammars/*.json
          git commit -m "grammars: update to latest versions

          Updated grammars:
          ${{ steps.update.outputs.changes }}"
          git push -u origin "$branch"
          
          # Check if PR already exists
          existing_pr=$(gh pr list --head "$branch" --json number -q '.[0].number' 2>/dev/null || echo "")
          
          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already exists for this branch"
          else
            gh pr create \
              --title "grammars: update to latest versions ($(date +%Y-%m-%d))" \
              --body "Automated tree-sitter grammar updates.

          ## Changes
          ${{ steps.update.outputs.changes }}

          ---
          *This PR was automatically generated by the update-grammars workflow.*" \
              --label "automated"
          fi
