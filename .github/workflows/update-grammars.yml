name: Update Tree-sitter Grammars

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      grammars:
        description: 'Specific grammars to update (space-separated, empty for all)'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Uses the *creator* App (separate from A4PR which only approves).
      # Two apps are required because GitHub forbids self-approval: the App
      # that opens a PR cannot also approve it.
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CONCIERGE_APP_ID }}
          private-key: ${{ secrets.CONCIERGE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use App token for checkout so git push can push branches
          # containing workflow files (GITHUB_TOKEN lacks workflows scope)
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Nix
        uses: cachix/install-nix-action@v31

      - name: Restore Nix store cache
        id: nix-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/nix-cache
          key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.run_id }}
          restore-keys: |
            nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            nix-store-${{ runner.os }}-

      - name: Import Nix store from cache
        if: steps.nix-cache.outputs.cache-hit == 'true'
        run: sudo $(which nix-store) --import < /tmp/nix-cache/store.nar

      - name: Set up git
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          # Resolve the App bot's numeric user id so commits and the PR
          # are attributed to the App's bot account, not github-actions[bot].
          bot_user="${APP_SLUG}[bot]"
          bot_id=$(gh api "/users/${bot_user}" --jq .id)
          git config user.name  "${bot_user}"
          git config user.email "${bot_id}+${bot_user}@users.noreply.github.com"
          echo "Committing as ${bot_user} <${bot_id}+${bot_user}@users.noreply.github.com>"

      - name: Update grammars
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GRAMMARS="${{ github.event.inputs.grammars }}"
          if [ -n "$GRAMMARS" ]; then
            nix develop --command nu scripts/update-grammars.nu --grammars "$GRAMMARS"
          else
            nix develop --command nu scripts/update-grammars.nu
          fi

      - name: Create pull request
        if: steps.update.outputs.updated == 'true'
        env:
          # Use the App token for both git push (needs workflows scope for
          # branches touching .github/workflows) and gh CLI, so the PR is
          # authored by the App's bot account instead of github-actions[bot].
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          branch="update/grammars-$(date +%Y%m%d)"
          
          # Check if branch exists remotely and delete it
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git push origin --delete "$branch" || true
          fi
          
          git checkout -b "$branch"
          git add grammars/*.json
          git commit -m "grammars: update to latest versions

          Updated grammars:
          ${{ steps.update.outputs.changes }}"
          git push -u origin "$branch"
          
          # Check if PR already exists
          existing_pr=$(gh pr list --head "$branch" --json number -q '.[0].number' 2>/dev/null || echo "")
          
          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already exists for this branch"
            pr_number="$existing_pr"
          else
            pr_url=$(gh pr create \
              --title "grammars: update to latest versions ($(date +%Y-%m-%d))" \
              --body "Automated tree-sitter grammar updates.

          ## Changes
          ${{ steps.update.outputs.changes }}

          ---
          *This PR was automatically generated by the update-grammars workflow.*")
            pr_number=$(echo "$pr_url" | grep -oE '[0-9]+$')
          fi
          
          # Try auto-merge first (works when branch protection blocks immediate merge);
          # fall back to an immediate squash merge if the PR is already in 'clean' state.
          gh pr merge "$pr_number" --squash --auto \
            || gh pr merge "$pr_number" --squash --delete-branch \
            || echo "Could not merge PR #$pr_number automatically; leaving it open."

      - name: Export Nix store for cache
        if: always()
        run: |
          rm -rf /tmp/nix-cache
          mkdir -p /tmp/nix-cache
          # Export all live store paths (everything reachable from GC roots)
          nix-store --gc --print-live | sudo $(which nix-store) --export > /tmp/nix-cache/store.nar
          echo "Cache size: $(du -sh /tmp/nix-cache/store.nar | cut -f1)"

      - name: Save Nix store cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/nix-cache
          key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.run_id }}
