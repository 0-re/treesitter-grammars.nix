name: Update Tree-sitter Grammars

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      grammars:
        description: 'Specific grammars to update (space-separated, empty for all)'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AUTO_APPROVE_APP_ID }}
          private-key: ${{ secrets.AUTO_APPROVE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use App token for checkout so git push can push branches
          # containing workflow files (GITHUB_TOKEN lacks workflows scope)
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Nix
        uses: cachix/install-nix-action@v31

      - name: Restore Nix store cache
        id: nix-cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/nix-cache
          key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-store-${{ runner.os }}-

      - name: Import Nix store from cache
        if: steps.nix-cache.outputs.cache-hit == 'true'
        run: sudo $(which nix-store) --import < /tmp/nix-cache/store.nar

      - name: Set up git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update grammars
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          GRAMMARS="${{ github.event.inputs.grammars }}"
          if [ -n "$GRAMMARS" ]; then
            nix develop --command nu scripts/update-grammars.nu --grammars "$GRAMMARS"
          else
            nix develop --command nu scripts/update-grammars.nu
          fi

      - name: Create pull request
        if: steps.update.outputs.updated == 'true'
        env:
          # App token for git push (needs workflows scope for branches with .github/workflows)
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          # GITHUB_TOKEN for gh CLI so the PR is authored by github-actions[bot]
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="update/grammars-$(date +%Y%m%d)"
          
          # Check if branch exists remotely and delete it
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git push origin --delete "$branch" || true
          fi
          
          git checkout -b "$branch"
          git add grammars/*.json
          git commit -m "grammars: update to latest versions

          Updated grammars:
          ${{ steps.update.outputs.changes }}"
          git push -u origin "$branch"
          
          # Check if PR already exists
          existing_pr=$(gh pr list --head "$branch" --json number -q '.[0].number' 2>/dev/null || echo "")
          
          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already exists for this branch"
            pr_number="$existing_pr"
          else
            pr_url=$(gh pr create \
              --title "grammars: update to latest versions ($(date +%Y-%m-%d))" \
              --body "Automated tree-sitter grammar updates.

          ## Changes
          ${{ steps.update.outputs.changes }}

          ---
          *This PR was automatically generated by the update-grammars workflow.*")
            pr_number=$(echo "$pr_url" | grep -oE '[0-9]+$')
          fi
          
          # Enable auto-merge; approval comes from the separate auto-approve workflow
          gh pr merge "$pr_number" --squash --auto

      - name: Export Nix store for cache
        if: always() && steps.nix-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/nix-cache
          # Build the devshell and get its runtime closure
          drv=$(nix build .#devShells.x86_64-linux.default --no-link --print-out-paths)
          nix-store --query --requisites $drv | sudo $(which nix-store) --export > /tmp/nix-cache/store.nar
          echo "Cache size: $(du -sh /tmp/nix-cache/store.nar | cut -f1)"

      - name: Save Nix store cache
        if: always() && steps.nix-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/nix-cache
          key: nix-store-${{ runner.os }}-${{ hashFiles('flake.lock') }}
